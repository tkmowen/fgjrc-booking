<!DOCTYPE html>
<html>

<head>

<title>FGJRC Booking</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

h2,h3{
text-align:center;
}

button{
padding:12px;
margin-top:6px;
background:black;
color:white;
border:none;
border-radius:8px;
width:100%;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
}

.card{
background:white;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

.menu button{
width:24%;
margin:2px;
}

.admin{
background:#fff3cd;
padding:10px;
border-radius:10px;
margin-top:20px;
}

.section{
font-weight:bold;
margin-top:20px;
}

</style>

</head>

<body>


<h2>
Fishguard & Goodwick Jemima Rowing Club
</h2>

<h3>
Booking System
</h3>



<div id="loginPage">

<h3>Login</h3>

<input id="loginName" placeholder="Name">
<input id="loginPass" placeholder="Password" type="password">

<button onclick="login()">
Login
</button>


<h3>Create Account</h3>

<input id="newName" placeholder="Name">
<input id="newPass" placeholder="Password">

<button onclick="createAccount()">
Create Account
</button>

</div>



<div id="app" style="display:none">


<div class="menu">

<button onclick="show('bookPage')">Book</button>
<button onclick="show('allPage')">Bookings</button>
<button onclick="show('myPage')">My Bookings</button>
<button onclick="show('assetPage')">Asset Management</button>

</div>



<div id="bookPage">

<h3>Create Booking</h3>

<select id="assetSelect"></select>

<input type="date" id="date">

Start
<input type="time" id="start">

End
<input type="time" id="end">

<button onclick="book()">Book</button>

</div>



<div id="allPage" style="display:none">

<h3>All Bookings</h3>

<div id="allBookings"></div>

</div>



<div id="myPage" style="display:none">

<h3>My Bookings</h3>

<div id="myBookings"></div>

</div>



<div id="assetPage" style="display:none" class="admin">

<h3>Asset Management</h3>


<h4>Add Boat</h4>

<input id="newBoatName" placeholder="Boat Name">

<select id="boatType">

<option>Single</option>
<option>Double</option>
<option>Quad</option>

</select>

<button onclick="addBoat()">
Add Boat
</button>



<h4>Add Erg</h4>

<input id="newErgName" placeholder="Erg Name">

<button onclick="addErg()">
Add Erg
</button>



<div class="section">Singles</div>

<div id="singles"></div>


<div class="section">Doubles</div>

<div id="doubles"></div>


<div class="section">Quads</div>

<div id="quads"></div>


<div class="section">Ergs</div>

<div id="ergs"></div>


</div>


</div>



<script>



var user=""


var users=JSON.parse(localStorage.getItem("users")) || [

{name:"admin",pass:"admin",approved:true,admin:true}

]



var boats=JSON.parse(localStorage.getItem("boats")) || [

{name:"Welsh Rowing 006",type:"Single",status:"Available"},
{name:"Welsh Rowing 005",type:"Single",status:"Available"},
{name:"Private Kraig",type:"Single",status:"Available"},
{name:"Private Martha",type:"Single",status:"Available"},
{name:"Private Gaynor",type:"Single",status:"Available"},
{name:"Private Pete",type:"Single",status:"Available"},

{name:"Nicky",type:"Double",status:"Available"},
{name:"Welsh Rowing Double",type:"Double",status:"Available"},

{name:"New Quad",type:"Quad",status:"Available"},
{name:"WSR Quad",type:"Quad",status:"Available"}

]



var ergs=JSON.parse(localStorage.getItem("ergs")) || [

{name:"Erg 1",status:"Available"},
{name:"Erg 2",status:"Available"},
{name:"Erg 3",status:"Available"},
{name:"Erg 4",status:"Available"},
{name:"Erg 5",status:"Available"}

]



var bookings=JSON.parse(localStorage.getItem("bookings")) || []



function save(){

localStorage.setItem("users",JSON.stringify(users))
localStorage.setItem("boats",JSON.stringify(boats))
localStorage.setItem("ergs",JSON.stringify(ergs))
localStorage.setItem("bookings",JSON.stringify(bookings))

}



function createAccount(){

users.push({

name:newName.value,
pass:newPass.value,
approved:true,
admin:false

})

save()

alert("Account Created")

}



function login(){

var found=users.find(u=>

u.name==loginName.value &&
u.pass==loginPass.value

)

if(!found){

alert("Login Failed")
return

}

user=found.name

loginPage.style.display="none"
app.style.display="block"

drawAssets()
drawBookings()
drawMyBookings()

}



function show(p){

bookPage.style.display="none"
allPage.style.display="none"
myPage.style.display="none"
assetPage.style.display="none"

document.getElementById(p).style.display="block"

}



function drawAssets(){

var select=""

boats.forEach(b=>{

select+=`<option>${b.name}</option>`

})

ergs.forEach(e=>{

select+=`<option>${e.name}</option>`

})

assetSelect.innerHTML=select


drawAssetManager()

}



function drawAssetManager(){



var singlesHTML=""
var doublesHTML=""
var quadsHTML=""
var ergHTML=""



boats.forEach((b,i)=>{


var card=`

<div class="card">

<input value="${b.name}" onchange="renameBoat(${i},this.value)">

<br>

${b.status}

<br>

<button onclick="toggleBoat(${i})">
Toggle Status
</button>

<button onclick="deleteBoat(${i})">
Delete Boat
</button>

</div>

`


if(b.type=="Single")
singlesHTML+=card

if(b.type=="Double")
doublesHTML+=card

if(b.type=="Quad")
quadsHTML+=card


})


ergs.forEach((e,i)=>{

ergHTML+=`

<div class="card">

<input value="${e.name}" onchange="renameErg(${i},this.value)">

<br>

${e.status}

<br>

<button onclick="toggleErg(${i})">
Toggle Status
</button>

<button onclick="deleteErg(${i})">
Delete Erg
</button>

</div>

`

})


singles.innerHTML=singlesHTML
doubles.innerHTML=doublesHTML
quads.innerHTML=quadsHTML
ergs.innerHTML=ergHTML


}



function renameBoat(i,name){

boats[i].name=name

save()

drawAssets()

}



function renameErg(i,name){

ergs[i].name=name

save()

drawAssets()

}



function toggleBoat(i){

boats[i].status=

boats[i].status=="Available"
?"Out of Service"
:"Available"

save()

drawAssets()

}



function toggleErg(i){

ergs[i].status=

ergs[i].status=="Available"
?"Out of Service"
:"Available"

save()

drawAssets()

}



function deleteBoat(i){

if(confirm("Delete Boat?")){

boats.splice(i,1)

save()

drawAssets()

}

}



function deleteErg(i){

if(confirm("Delete Erg?")){

ergs.splice(i,1)

save()

drawAssets()

}

}



function addBoat(){

boats.push({

name:newBoatName.value,
type:boatType.value,
status:"Available"

})

save()

drawAssets()

}



function addErg(){

ergs.push({

name:newErgName.value,
status:"Available"

})

save()

drawAssets()

}



function book(){


var asset=assetSelect.value

var d=date.value

var s=start.value

var e=end.value


var assetObj=

boats.find(b=>b.name==asset) ||
ergs.find(x=>x.name==asset)



if(assetObj.status!="Available"){

alert("Out of Service")
return

}



for(var b of bookings){

if(

b.asset==asset &&
b.date==d &&
!(e<=b.start || s>=b.end)

){

alert("Time Conflict")
return

}

}


bookings.push({

asset:asset,
date:d,
start:s,
end:e,
user:user

})


save()

drawBookings()
drawMyBookings()

}



function drawBookings(){

var html=""

for(var b of bookings){

html+=`

<div class="card">

<b>${b.asset}</b>

<br>

${b.date}

<br>

${b.start}-${b.end}

<br>

${b.user}

</div>

`

}

allBookings.innerHTML=html

}



function drawMyBookings(){

var html=""

bookings.forEach((b,i)=>{

if(b.user==user){

html+=`

<div class="card">

<b>${b.asset}</b>

<br>

${b.date}

<br>

${b.start}-${b.end}

<br>

<button onclick="cancel(${i})">
Cancel
</button>

</div>

`

}

})

myBookings.innerHTML=html

}



function cancel(i){

bookings.splice(i,1)

save()

drawBookings()
drawMyBookings()

}



</script>


</body>

</html>
