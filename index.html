<!DOCTYPE html>
<html>

<head>

<title>FGJRC Booking</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

button{
padding:12px;
margin-top:6px;
background:black;
color:white;
border:none;
border-radius:8px;
width:100%;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
}

.card{
background:white;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ddd;
}

.menu button{
width:24%;
margin:2px;
}

.admin{
background:#fff3cd;
padding:10px;
border-radius:10px;
margin-top:20px;
}

.sectionTitle{
margin-top:20px;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<h2 align="center">
Fishguard & Goodwick Jemima Rowing Club
</h2>

<h3 align="center">
Booking System
</h3>


<div id="loginPage">

<h3>Login</h3>

<input id="loginName" placeholder="Name">
<input id="loginPass" placeholder="Password" type="password">

<button onclick="login()">
Login
</button>

<h3>Create Account</h3>

<input id="newName" placeholder="Name">
<input id="newPass" placeholder="Password">

<button onclick="createAccount()">
Create Account
</button>

</div>



<div id="app" style="display:none">

<div class="menu">

<button onclick="show('bookPage')">Book</button>
<button onclick="show('allPage')">Bookings</button>
<button onclick="show('myPage')">My Bookings</button>
<button onclick="show('assetPage')">Assets</button>

</div>


<div id="bookPage">

<h3>Create Booking</h3>

<select id="assetSelect"></select>

<input type="date" id="date">

Start
<input type="time" id="start">

End
<input type="time" id="end">

<button onclick="book()">Book</button>

</div>


<div id="allPage" style="display:none">

<h3>All Bookings</h3>

<div id="allBookings"></div>

</div>


<div id="myPage" style="display:none">

<h3>My Bookings</h3>

<div id="myBookings"></div>

</div>


<div id="assetPage" style="display:none" class="admin">

<h3>Asset Management</h3>

Add Boat

<input id="newBoat" placeholder="Boat name">

<button onclick="addBoat()">Add Boat</button>


Add Erg

<input id="newErg" placeholder="Erg name">

<button onclick="addErg()">Add Erg</button>


<div class="sectionTitle">
Boats
</div>

<div id="boats"></div>


<div class="sectionTitle">
Ergs
</div>

<div id="ergs"></div>


</div>


</div>



<script>


var user=""


var users=JSON.parse(localStorage.getItem("users")) || [

{name:"admin",pass:"admin",approved:true,admin:true}

]


var boats=JSON.parse(localStorage.getItem("boats")) || [

{name:"Single 1",status:"Available"},
{name:"Single 2",status:"Available"},
{name:"Double 1",status:"Available"},
{name:"Quad",status:"Available"}

]


var ergs=JSON.parse(localStorage.getItem("ergs")) || [

{name:"Erg 1",status:"Available"},
{name:"Erg 2",status:"Available"},
{name:"Erg 3",status:"Available"},
{name:"Erg 4",status:"Available"},
{name:"Erg 5",status:"Available"}

]


var bookings=JSON.parse(localStorage.getItem("bookings")) || []


function save(){

localStorage.setItem("users",JSON.stringify(users))
localStorage.setItem("boats",JSON.stringify(boats))
localStorage.setItem("ergs",JSON.stringify(ergs))
localStorage.setItem("bookings",JSON.stringify(bookings))

}


function createAccount(){

var n=newName.value
var p=newPass.value

users.push({
name:n,
pass:p,
approved:false,
admin:false
})

save()

alert("Account created. Wait for approval.")

}



function login(){

var n=loginName.value
var p=loginPass.value

var found=users.find(u=>u.name==n && u.pass==p)

if(!found){

alert("Login failed")
return

}

if(!found.approved){

alert("Waiting for admin approval")
return

}

user=n

loginPage.style.display="none"

app.style.display="block"

drawAssets()
drawBookings()
drawMyBookings()

}



function show(p){

bookPage.style.display="none"
allPage.style.display="none"
myPage.style.display="none"
assetPage.style.display="none"

document.getElementById(p).style.display="block"

}



function drawAssets(){

var select=""

boats.forEach(b=>{

select+=`<option>${b.name}</option>`

})

ergs.forEach(e=>{

select+=`<option>${e.name}</option>`

})

assetSelect.innerHTML=select


drawAssetManager()

}



function drawAssetManager(){

var bhtml=""

boats.forEach((b,i)=>{

bhtml+=`

<div class="card">

<input value="${b.name}" onchange="renameBoat(${i},this.value)">

${b.status}

<button onclick="toggleBoat(${i})">
Toggle Status
</button>

</div>

`

})


boatsDiv=document.getElementById("boats")
boatsDiv.innerHTML=bhtml



var ehtml=""

ergs.forEach((e,i)=>{

ehtml+=`

<div class="card">

<input value="${e.name}" onchange="renameErg(${i},this.value)">

${e.status}

<button onclick="toggleErg(${i})">
Toggle Status
</button>

</div>

`

})


ergsDiv=document.getElementById("ergs")
ergsDiv.innerHTML=ehtml

}



function renameBoat(i,name){

boats[i].name=name

save()

drawAssets()

}



function renameErg(i,name){

ergs[i].name=name

save()

drawAssets()

}



function toggleBoat(i){

boats[i].status=
boats[i].status=="Available"?"Out of Service":"Available"

save()

drawAssets()

}



function toggleErg(i){

ergs[i].status=
ergs[i].status=="Available"?"Out of Service":"Available"

save()

drawAssets()

}



function addBoat(){

boats.push({

name:newBoat.value,
status:"Available"

})

save()

drawAssets()

}



function addErg(){

ergs.push({

name:newErg.value,
status:"Available"

})

save()

drawAssets()

}



function book(){

var asset=assetSelect.value
var date=date.value
var start=start.value
var end=end.value


var assetObj=

boats.find(b=>b.name==asset) ||
ergs.find(e=>e.name==asset)



if(assetObj.status!="Available"){

alert("Out of Service")
return

}



for(var b of bookings){

if(

b.asset==asset &&
b.date==date &&
!(end<=b.start || start>=b.end)

){

alert("Time conflict")
return

}

}


bookings.push({

asset,date,start,end,user

})

save()

drawBookings()
drawMyBookings()

}



function drawBookings(){

var html=""

for(var b of bookings){

html+=`

<div class="card">

<b>${b.asset}</b>

<br>

${b.date}

<br>

${b.start}-${b.end}

<br>

${b.user}

</div>

`

}

allBookings.innerHTML=html

}



function drawMyBookings(){

var html=""

bookings.forEach((b,i)=>{

if(b.user==user){

html+=`

<div class="card">

<b>${b.asset}</b>

<br>

${b.date}

<br>

${b.start}-${b.end}

<br>

<button onclick="cancel(${i})">
Cancel
</button>

</div>

`

}

})

myBookings.innerHTML=html

}



function cancel(i){

bookings.splice(i,1)

save()

drawBookings()
drawMyBookings()

}



</script>


</body>

</html>
